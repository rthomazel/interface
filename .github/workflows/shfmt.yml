name: shfmt

on:
  pull_request:

jobs:
  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

        # -ln bash causes editor config to not be respected.
        # could be fixable by a more complex editor config that would catch scripts without .sh extension.
      - name: run shfmt
        run: |
          find bin dotfiles -type f -print0 \
          | xargs -0 grep -lZE '^#! ?/usr/bin/env bash|^#!/usr/bin/env bash|^#! ?/bin/bash' \
          | xargs -0 shfmt -ln bash -i 2 -d
