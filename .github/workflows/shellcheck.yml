name: shellcheck

on:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: bin/setup

      - name: run shellcheck
        run: |
          find bin dotfiles -type f \
          | xargs grep -lE '^#! ?/usr/bin/env bash|^#!/usr/bin/env bash|^#! ?/bin/bash' \
          | xargs shellcheck
